name: Build and Deploy

on:
  schedule:
    # Runs at 09:00 UTC every Friday
    - cron: '0 9 * * 5'
  workflow_dispatch: # Allows you to trigger this manually from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug env secrets
        run: |
          echo "DEEPL_API_KEY present: ${{ !! secrets.DEEPL_API_KEY }}"
          echo "DEEPL_API_KEY first chars: ${DEEPL_API_KEY:0:4}"

      - name: Run translation and build
        run: npm run build
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          MICROSOFT_TRANSLATOR_KEY: ${{ secrets.MICROSOFT_TRANSLATOR_KEY }}

      - name: Trigger deploy
        run: |
          curl -X POST ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}